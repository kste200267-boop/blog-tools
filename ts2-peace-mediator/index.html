<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>평화 중재실 — 통합사회2 Ⅳ.세계화와 평화</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard','Noto Sans KR',sans-serif;}
  :root{--bg:#0b1a17;--card:#11241f;--line:#244038;--gold:#34d399;--ink:#e9fbf4;--sub:#9fd4c4;}
  body{background:linear-gradient(160deg,#08120f,#0e211c);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;}
  .wrap{width:100%;max-width:680px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 18px 50px rgba(0,0,0,.4);}
  .badge{display:inline-block;font-size:12px;font-weight:700;color:#06120f;background:var(--gold);padding:4px 12px;border-radius:20px;letter-spacing:.5px;}
  h1{font-size:30px;margin:14px 0 6px;letter-spacing:-.5px;}
  h1 .em{color:var(--gold);}
  .lead{color:var(--sub);font-size:15px;line-height:1.7;margin-bottom:18px;}
  .rights{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0 22px;}
  .rchip{text-align:center;font-size:11.5px;font-weight:700;padding:9px 4px;border-radius:10px;border:1px solid var(--line);color:var(--ink);}
  .btn{display:block;width:100%;background:var(--gold);color:#06120f;border:none;font-size:16px;font-weight:800;padding:15px;border-radius:12px;cursor:pointer;transition:.15s;}
  .btn:hover{filter:brightness(1.07);transform:translateY(-1px);}
  .meta{margin-top:16px;text-align:center;font-size:12.5px;color:var(--sub);}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .bar{flex:1;height:8px;background:#0a1814;border-radius:6px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#a7f3d0);width:0;transition:width .4s;}
  .score{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;}
  .case-tag{font-size:12px;font-weight:700;color:var(--sub);}
  .case{font-size:18.5px;line-height:1.65;margin:8px 0 18px;font-weight:500;}
  .q{font-size:14px;color:var(--sub);margin-bottom:10px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{background:#0c1d18;border:1.5px solid var(--line);color:var(--ink);font-size:14.5px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--gold);}
  .opt:disabled{cursor:default;opacity:.65;}
  .opt.right{background:rgba(52,211,153,.2);border-color:#34d399;color:#bbf7d0;}
  .opt.wrong{background:rgba(239,68,68,.16);border-color:#ef4444;color:#fdb4b4;}
  .feed{margin-top:16px;background:#0a1814;border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:1.7;color:#d6f3e8;display:none;}
  .feed b{color:var(--gold);}
  .next{margin-top:14px;display:none;}
  .res-grade{font-size:38px;font-weight:800;color:var(--gold);text-align:center;margin:6px 0;}
  .res-line{text-align:center;color:var(--sub);font-size:15px;line-height:1.7;margin-bottom:16px;}
  .res-stat{background:#0a1814;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.8;color:#d6f3e8;margin-bottom:18px;}
  .hide{display:none;}
  @media(max-width:520px){.opts{grid-template-columns:1fr;}.rights{grid-template-columns:repeat(2,1fr);}h1{font-size:25px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel" id="start">
    <span class="badge">통합사회2 · Ⅳ. 세계화와 평화</span>
    <h1>🕊️ 평화 <span class="em">중재실</span></h1>
    <p class="lead">당신은 평화 중재자입니다. 갈퉁의 눈으로 상황을 읽고, 그것이 <b>어떤 폭력</b>이며 <b>어떤 평화</b>인지 가려내세요. 갈등은 ‘싸움을 멈추는 것’만으로 끝나지 않습니다.</p>
    <div class="rights">
      <div class="rchip" style="border-color:#ef4444">직접적 폭력</div>
      <div class="rchip" style="border-color:#f97316">구조적 폭력</div>
      <div class="rchip" style="border-color:#a855f7">문화적 폭력</div>
      <div class="rchip" style="border-color:#3b82f6">소극적 평화</div>
      <div class="rchip" style="border-color:#22c55e">적극적 평화</div>
    </div>
    <button class="btn" onclick="start()">중재 시작하기 ▶</button>
    <p class="meta">교육 목적 수업 활동용 · 사례는 학습용으로 재구성한 예시입니다(특정 보도·실명 아님).</p>
  </div>

  <div class="panel hide" id="play">
    <div class="top">
      <span class="case-tag" id="ctag">1 / 7</span>
      <div class="bar"><i id="barfill"></i></div>
      <span class="score">🕊️ <span id="score">0</span></span>
    </div>
    <div class="case" id="caseText"></div>
    <div class="q">이 상황을 가장 잘 설명하는 개념은?</div>
    <div class="opts" id="opts"></div>
    <div class="feed" id="feed"></div>
    <button class="btn next" id="nextBtn" onclick="next()">다음 사례 →</button>
  </div>

  <div class="panel hide" id="result">
    <span class="badge">중재 종료</span>
    <div class="res-grade" id="grade"></div>
    <div class="res-line" id="resLine"></div>
    <div class="res-stat" id="resStat"></div>
    <button class="btn" onclick="location.reload()">↺ 다시 중재하기</button>
    <p class="meta">평화는 ‘싸움이 없는 상태’를 넘어, 차별과 가난 같은 구조까지 바꾸는 일입니다.</p>
  </div>
</div>
<script>
const RIGHTS={직접:'직접적 폭력',구조:'구조적 폭력',문화:'문화적 폭력',소극:'소극적 평화',적극:'적극적 평화'};
const CASES=[
 {t:'두 나라가 전쟁을 멈추고 휴전했다. 총성은 그쳤지만, 무너진 학교와 일자리는 그대로이고 사람들은 여전히 가난과 불안 속에 산다.', a:'소극', why:'직접적 폭력(전쟁)이 멈춘 상태가 <b>소극적 평화</b>입니다. 구조적 문제가 남아 있어, 진짜 평화로 가려면 <b>적극적 평화</b>가 필요해요.'},
 {t:'어떤 지역의 아이들은 가난과 차별 때문에 교육도 의료도 제대로 받지 못한다. 누가 때린 것은 아니지만 삶이 무너진다.', a:'구조', why:'특정인이 가한 폭력이 아니라 <b>사회 구조·제도</b> 때문에 생기는 고통이 <b>구조적 폭력</b>입니다(빈곤·차별·불평등).'},
 {t:'한 사회에서 특정 집단을 비하하는 농담과 표현이 방송과 일상에 자연스럽게 퍼져 있다.', a:'문화', why:'폭력과 차별을 ‘당연한 것’으로 정당화하는 언어·이념·문화가 <b>문화적 폭력</b>입니다. 직접·구조적 폭력을 떠받쳐요.'},
 {t:'서로 적대하던 두 지역이 청소년 교류와 공동 연구를 시작해, 오해를 줄이고 신뢰를 쌓아 갔다.', a:'적극', why:'싸움을 멈추는 데서 나아가 <b>구조와 관계를 바꿔 평화를 만드는 것</b>이 <b>적극적 평화</b>입니다.'},
 {t:'분쟁 지역에 국제기구가 들어가 양측을 중재하고, 무력 충돌이 다시 일어나지 않도록 감시했다.', a:'소극', why:'직접적 폭력의 재발을 막는 단계라 <b>소극적 평화</b>입니다. 이후 구조 개선까지 가야 적극적 평화가 완성돼요.'},
 {t:'한 나라가 가난한 나라에 학교를 짓고 기술을 전해, 그 사회가 스스로 설 수 있도록 도왔다.', a:'적극', why:'빈곤이라는 <b>구조적 폭력을 줄이는 노력</b>입니다. ODA·국제 협력은 <b>적극적 평화</b>를 만드는 대표적 방법이에요.'},
 {t:'시위하는 사람들을 향해 경찰이 직접 물리력을 행사해 다치게 했다.', a:'직접', why:'사람이 사람에게 직접 가하는 신체적 폭력이 <b>직접적 폭력</b>입니다. 가장 눈에 잘 보이는 폭력이에요.'},
];
let i=0,score=0;
function start(){document.getElementById('start').classList.add('hide');document.getElementById('play').classList.remove('hide');render();}
function render(){
 const c=CASES[i];
 document.getElementById('ctag').textContent=(i+1)+' / '+CASES.length;
 document.getElementById('barfill').style.width=(i/CASES.length*100)+'%';
 document.getElementById('caseText').textContent=c.t;
 const op=document.getElementById('opts');op.innerHTML='';
 document.getElementById('feed').style.display='none';
 document.getElementById('nextBtn').style.display='none';
 Object.keys(RIGHTS).forEach(k=>{
   const b=document.createElement('button');b.className='opt';b.textContent=RIGHTS[k];
   b.onclick=()=>judge(k,b);op.appendChild(b);
 });
}
function judge(key,btn){
 const c=CASES[i];const correct=key===c.a;
 [...document.querySelectorAll('.opt')].forEach(b=>{b.disabled=true;if(b.textContent===RIGHTS[c.a])b.classList.add('right');});
 if(!correct)btn.classList.add('wrong');else score++;
 document.getElementById('score').textContent=score;
 const f=document.getElementById('feed');
 f.innerHTML=(correct?'✅ <b>정확한 중재!</b> ':'🕊️ <b>정답은 '+RIGHTS[c.a]+'</b> ')+c.why;
 f.style.display='block';
 document.getElementById('nextBtn').style.display='block';
 document.getElementById('nextBtn').textContent=(i<CASES.length-1)?'다음 사례 →':'중재 결과 보기 →';
}
function next(){i++;if(i<CASES.length){render();}else{showResult();}}
function showResult(){
 document.getElementById('play').classList.add('hide');
 document.getElementById('result').classList.remove('hide');
 const n=score,total=CASES.length;let grade,line;
 if(n>=7){grade='평화 대사';line='갈퉁의 폭력·평화 개념을 완전히 꿰뚫었습니다. 어떤 갈등도 구조까지 읽어 내는군요.';}
 else if(n>=5){grade='중재 전문가';line='평화의 큰 틀을 잘 잡았어요. 소극적·적극적 평화의 경계만 더 또렷이.';}
 else if(n>=3){grade='중재 보조';line='절반은 잡았습니다. 직접·구조·문화적 폭력의 차이를 한 번 더 정리해요.';}
 else{grade='수습 중재자';line='괜찮아요, 갈퉁의 틀은 반복하면 손에 붙습니다. 한 번 더 해 봐요.';}
 document.getElementById('grade').textContent='🕊️ '+grade;
 document.getElementById('resLine').textContent=line;
 document.getElementById('resStat').innerHTML='중재 정확도 <b style="color:var(--gold)">'+n+' / '+total+'</b><br>오늘 다룬 개념: 직접적·구조적·문화적 폭력 / 소극적·적극적 평화<br>한 줄 정리: <b>평화는 싸움을 멈추는 데서 끝나지 않고, 구조와 문화까지 바꿀 때 완성됩니다.</b>';
 document.getElementById('barfill').style.width='100%';
}
</script>
</body>
</html>
