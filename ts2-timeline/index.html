<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합사회2 인터랙티브 연표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --theme:#0D9488; --theme-d:#0a6e66; --theme-l:#e6f6f4; --theme-g:#0D948822;
  --ink:#1E293B; --sub:#64748B; --line:#e2e8f0; --bg:#f7f9fb;
  --gap:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
h1,h2,h3,.jua{font-family:'Jua',sans-serif;font-weight:400;letter-spacing:.2px;}

/* ===== Header ===== */
header{
  background:linear-gradient(135deg,var(--theme) 0%,var(--theme-d) 100%);
  color:#fff;padding:18px 26px 14px;box-shadow:0 4px 18px rgba(0,0,0,.12);
  transition:background .45s ease;z-index:30;position:relative;
}
header .ttl{font-size:26px;display:flex;align-items:center;gap:11px;}
header .ttl .badge{
  font-family:'Noto Sans KR';font-weight:700;font-size:12px;background:rgba(255,255,255,.22);
  padding:4px 11px;border-radius:20px;letter-spacing:.5px;
}
header .desc{font-size:13.5px;opacity:.92;margin-top:5px;font-weight:400;}

/* ===== Tabs ===== */
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid var(--line);
  padding:0 18px;z-index:20;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.03);}
.tab{
  border:none;background:none;cursor:pointer;font-family:'Jua',sans-serif;font-size:16px;
  color:var(--sub);padding:15px 22px 13px;position:relative;display:flex;align-items:center;gap:8px;
  transition:color .25s;white-space:nowrap;
}
.tab .dot{width:11px;height:11px;border-radius:50%;display:inline-block;transition:transform .25s;}
.tab.t0 .dot{background:#0D9488;} .tab.t1 .dot{background:#EA580C;} .tab.t2 .dot{background:#16A34A;}
.tab .sub{font-family:'Noto Sans KR';font-weight:500;font-size:11px;color:#94a3b8;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--ink);}
.tab.active .dot{transform:scale(1.25);}
.tab .underline{position:absolute;left:14px;right:14px;bottom:-1px;height:3px;border-radius:3px;background:transparent;transition:background .25s;}
.tab.active .underline{background:var(--theme);}

/* ===== Toolbar ===== */
.toolbar{display:flex;align-items:center;gap:14px;padding:9px 22px;background:#fff;
  border-bottom:1px solid var(--line);z-index:15;position:relative;flex-wrap:wrap;}
.toolbar .hint{font-size:12.5px;color:var(--sub);display:flex;align-items:center;gap:6px;}
.toolbar .hint b{color:var(--theme-d);font-weight:700;}
.toolbar .spacer{flex:1;}
.zoomgrp{display:flex;align-items:center;gap:7px;background:var(--theme-l);border-radius:22px;padding:4px 8px;
  transition:background .45s;}
.zbtn{width:30px;height:30px;border-radius:50%;border:none;background:#fff;color:var(--theme-d);
  font-size:18px;cursor:pointer;font-weight:700;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.zbtn:hover{transform:scale(1.08);} .zbtn:active{transform:scale(.94);}
.zlabel{font-size:12px;color:var(--theme-d);font-weight:700;min-width:42px;text-align:center;}
.count{font-size:12.5px;color:var(--sub);}
.count b{color:var(--theme-d);font-family:'Jua';font-size:15px;}

/* ===== Timeline scroller ===== */
.stage{position:absolute;left:0;right:0;bottom:0;top:0;overflow:hidden;}
.scroller{position:absolute;left:0;right:0;top:0;bottom:0;overflow-x:auto;overflow-y:hidden;
  cursor:grab;padding:0 60px;scroll-behavior:smooth;}
.scroller.dragging{cursor:grabbing;scroll-behavior:auto;}
.scroller::-webkit-scrollbar{height:11px;}
.scroller::-webkit-scrollbar-track{background:#eef1f4;}
.scroller::-webkit-scrollbar-thumb{background:var(--theme);border-radius:8px;border:3px solid #eef1f4;}

.track{position:relative;height:100%;display:flex;align-items:center;min-width:max-content;}
/* center line */
.track::before{content:"";position:absolute;left:0;right:0;top:50%;height:4px;
  background:linear-gradient(90deg,transparent,var(--theme) 6%,var(--theme) 94%,transparent);
  border-radius:4px;transform:translateY(-50%);z-index:1;}

.node{position:relative;width:var(--gap);flex:0 0 var(--gap);height:100%;
  display:flex;align-items:center;justify-content:center;z-index:2;}
/* the dot on the line */
.dot-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:50%;background:#fff;border:4px solid var(--theme);
  cursor:pointer;z-index:5;transition:transform .2s, box-shadow .2s;box-shadow:0 0 0 5px var(--theme-g);}
.dot-pin:hover{transform:translate(-50%,-50%) scale(1.18);}
.node.open .dot-pin{background:var(--theme);transform:translate(-50%,-50%) scale(1.25);
  box-shadow:0 0 0 7px var(--theme-g);}

/* connector */
.connector{position:absolute;left:50%;width:3px;background:var(--theme);transform:translateX(-50%);z-index:2;
  opacity:.55;transition:height .25s;}
.node.up .connector{bottom:50%;}
.node.down .connector{top:50%;}

/* card */
.card{position:absolute;left:50%;transform:translateX(-50%);width:230px;
  background:#fff;border-radius:14px;box-shadow:0 6px 22px rgba(15,23,42,.12);
  border:1px solid var(--line);border-top:5px solid var(--theme);cursor:pointer;
  transition:box-shadow .2s, transform .2s;z-index:4;overflow:hidden;}
.node.up .card{bottom:calc(50% + 54px);}
.node.down .card{top:calc(50% + 54px);}
.card:hover{box-shadow:0 10px 30px rgba(15,23,42,.18);}
.node.open .card{width:300px;z-index:8;box-shadow:0 14px 40px rgba(15,23,42,.22);}

.card .yr{font-family:'Jua';font-size:21px;color:var(--theme);padding:11px 15px 2px;line-height:1;}
.card .era{font-size:10.5px;color:#fff;background:var(--theme);display:inline-block;
  padding:2px 9px;border-radius:11px;margin:9px 0 0 15px;font-weight:700;}
.card .nm{font-family:'Jua';font-size:15.5px;color:var(--ink);padding:7px 15px 12px;line-height:1.35;}
.card .body{max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s;
  padding:0 15px;}
.node.open .card .body{max-height:340px;opacity:1;padding:0 15px 14px;}
.card .body .sec{margin-top:9px;}
.card .body .sec .lbl{font-family:'Jua';font-size:12px;color:var(--theme-d);display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.card .body .sec .lbl::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--theme);display:inline-block;}
.card .body .sec p{font-size:12.7px;line-height:1.62;color:#334155;}
.card .body .sec.sig p{color:var(--theme-d);font-weight:500;}
.card .more{font-size:11px;color:var(--sub);padding:0 15px 11px;display:flex;align-items:center;gap:4px;}
.node.open .card .more{display:none;}
.card .more::after{content:"▾";}

/* phase band labels (era markers under the line) */
.phase{position:absolute;top:calc(50% + 26px);left:50%;transform:translateX(-50%);
  font-size:11px;color:#94a3b8;white-space:nowrap;font-weight:500;display:none;}

/* intro endcap */
.endcap{flex:0 0 30px;}

/* legend / footer */
.scrollnote{position:absolute;bottom:14px;right:18px;font-size:11px;color:#b6c0cc;z-index:5;pointer-events:none;}

@media (max-width:560px){
  header .ttl{font-size:21px;} .card{width:200px;} .node.open .card{width:250px;}
}
</style>
</head>
<body>
<header id="hdr">
  <div class="ttl jua">통합사회2 인터랙티브 연표 <span class="badge" id="trackBadge">인권 발전사</span></div>
  <div class="desc" id="trackDesc">시민의 권리가 어떻게 넓어져 왔는지, 핵심 장면을 시간 순서로 따라가 봅니다.</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab t0 active" data-i="0"><span class="dot"></span><span>인권 발전사<span class="sub"> · 권리의 확장</span></span><span class="underline"></span></button>
  <button class="tab t1" data-i="1"><span class="dot"></span><span>세계화·국제 평화<span class="sub"> · 연결과 협력</span></span><span class="underline"></span></button>
  <button class="tab t2" data-i="2"><span class="dot"></span><span>인구·기후/지속가능발전<span class="sub"> · 미래를 위한 약속</span></span><span class="underline"></span></button>
</div>

<div class="toolbar">
  <div class="hint">노드를 <b>클릭</b>하면 카드가 펼쳐져요 · 빈 곳을 <b>드래그</b>하면 좌우로 이동</div>
  <div class="count">사건 <b id="cnt">0</b>개</div>
  <div class="spacer"></div>
  <div class="zoomgrp">
    <button class="zbtn" id="zout">−</button>
    <span class="zlabel" id="zlabel">100%</span>
    <button class="zbtn" id="zin">+</button>
  </div>
</div>

<div class="stage">
  <div class="scroller" id="scroller">
    <div class="track" id="track"></div>
  </div>
  <div class="scrollnote">← 좌우 스크롤 / 드래그 →</div>
</div>

<script>

   ========================================================= */

/* =========================================================
   렌더링 & 상호작용
   ========================================================= */
const track   = document.getElementById('track');
const scroller= document.getElementById('scroller');
const tabs    = document.getElementById('tabs');
const hdr     = document.getElementById('hdr');
let cur = 0;
let zoom = 1;
const ZMIN=0.7, ZMAX=1.6, ZSTEP=0.15;
const BASEGAP = 250;

function applyTheme(t){
  const r=document.documentElement.style;
  r.setProperty('--theme',t.color);
  r.setProperty('--theme-d',t.dark);
  r.setProperty('--theme-l',t.light);
  r.setProperty('--theme-g',t.glow);
  document.getElementById('trackBadge').textContent=t.name;
  document.getElementById('trackDesc').textContent=t.desc;
}

function render(i){
  cur=i;
  const t=TRACKS[i];
  applyTheme(t);
  document.getElementById('cnt').textContent=t.events.length;
  // tabs
  [...tabs.children].forEach((b,k)=>b.classList.toggle('active',k===i));

  track.innerHTML='';
  const lead=document.createElement('div'); lead.className='endcap'; track.appendChild(lead);

  t.events.forEach((e,k)=>{
    const up = k%2===0; // 짝수=위, 홀수=아래
    const node=document.createElement('div');
    node.className='node '+(up?'up':'down');
    node.innerHTML=`
      <div class="connector" style="height:54px;"></div>
      <div class="dot-pin"></div>
      <div class="card">
        <div class="yr">${e.yr}</div>
        <span class="era">${e.era}</span>
        <div class="nm">${e.nm}</div>
        <div class="body">
          <div class="sec"><div class="lbl">무슨 일이 있었나</div><p>${e.desc}</p></div>
          <div class="sec sig"><div class="lbl">왜 중요한가</div><p>${e.sig}</p></div>
        </div>
        <div class="more">자세히 보기 </div>
      </div>`;
    // click handlers (dot + card)
    const open=(ev)=>{
      ev.stopPropagation();
      const wasOpen=node.classList.contains('open');
      [...track.querySelectorAll('.node.open')].forEach(n=>n.classList.remove('open'));
      if(!wasOpen){ node.classList.add('open');
        // ensure visible
        node.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
      }
    };
    node.querySelector('.dot-pin').addEventListener('click',open);
    node.querySelector('.card').addEventListener('click',open);
    track.appendChild(node);
  });
  const tail=document.createElement('div'); tail.className='endcap'; track.appendChild(tail);
  applyZoom();
  scroller.scrollLeft=0;
}

function applyZoom(){
  const g = Math.round(BASEGAP*zoom);
  document.documentElement.style.setProperty('--gap', g+'px');
  document.getElementById('zlabel').textContent=Math.round(zoom*100)+'%';
}

document.getElementById('zin').addEventListener('click',()=>{zoom=Math.min(ZMAX,zoom+ZSTEP);applyZoom();});
document.getElementById('zout').addEventListener('click',()=>{zoom=Math.max(ZMIN,zoom-ZSTEP);applyZoom();});

tabs.addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b)return;
  render(+b.dataset.i);
});

// close open card when clicking empty stage
scroller.addEventListener('click',e=>{
  if(e.target===scroller||e.target===track){
    [...track.querySelectorAll('.node.open')].forEach(n=>n.classList.remove('open'));
  }
});

/* ---- drag to scroll ---- */
let isDown=false,startX=0,startScroll=0,moved=0;
scroller.addEventListener('pointerdown',e=>{
  if(e.target.closest('.card')||e.target.closest('.dot-pin'))return;
  isDown=true;moved=0;startX=e.clientX;startScroll=scroller.scrollLeft;
  scroller.classList.add('dragging');scroller.setPointerCapture(e.pointerId);
});
scroller.addEventListener('pointermove',e=>{
  if(!isDown)return;
  const dx=e.clientX-startX;moved=Math.abs(dx);
  scroller.scrollLeft=startScroll-dx;
});
function endDrag(){isDown=false;scroller.classList.remove('dragging');}
scroller.addEventListener('pointerup',endDrag);
scroller.addEventListener('pointercancel',endDrag);
scroller.addEventListener('pointerleave',endDrag);

/* ---- wheel: vertical wheel scrolls horizontally ---- */
scroller.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
    scroller.scrollLeft+=e.deltaY;e.preventDefault();
  }
},{passive:false});

render(0);
</script>
